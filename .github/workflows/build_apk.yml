name: Gerar APK do Racha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório
      - name: Baixar codigo do projeto
        uses: actions/checkout@v4

      # 2. Configura o Java na máquina virtual
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configura o Flutter estável na máquina virtual
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      # 4. Baixa todas as dependências entrando na pasta correta
      - name: Baixar dependencias do App
        run: |
          cd racha_da_resenha
          flutter pub get

      # 5. Compila o código entrando na pasta correta
      - name: Fabricar APK Release
        run: |
          cd racha_da_resenha
          flutter build apk --release

      # 6. Salva o APK pronto que está dentro da subpasta
      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: Racha_da_Resenha_APK
          path: racha_da_resenha/build/app/outputs/flutter-apk/app-release.apk
